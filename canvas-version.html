<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Otter - I'm Sorry 🦦💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff0f8 0%, #fde2f0 40%, #ffecd2 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
      user-select: none;
    }

    .bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.15;
      animation: drift linear infinite;
      pointer-events: none;
    }
    @keyframes drift {
      0%   { transform: translateY(110vh) scale(1); }
      100% { transform: translateY(-20vh) scale(1.1); }
    }

    .title {
      font-size: 2.3rem;
      color: #c0392b;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.12);
      margin-bottom: 8px;
      animation: pulse 2.5s ease-in-out infinite;
      text-align: center;
      z-index: 1;
    }
    .subtitle {
      font-size: 1.15rem;
      color: #7f6250;
      margin-bottom: 18px;
      text-align: center;
      z-index: 1;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    canvas {
      display: block;
      margin: 20px 0;
      filter: drop-shadow(0 12px 32px rgba(0,0,0,0.15));
    }

    .btn-area {
      display: flex;
      gap: 22px;
      margin-top: 24px;
      z-index: 1;
    }
    .btn {
      padding: 14px 34px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      font-family: inherit;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }

    #yes-btn {
      background: linear-gradient(135deg, #fd79a8, #e84393);
      color: white;
    }
    #no-btn {
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      color: white;
      position: relative;
    }

    .petal {
      position: fixed;
      pointer-events: none;
      top: -60px;
      z-index: 900;
      animation: petal-fall linear forwards;
    }
    @keyframes petal-fall {
      0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(115vh) rotate(600deg) scale(0.8); opacity: 0; }
    }

    #hurray {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 950;
      pointer-events: none;
    }
    #hurray.show { display: flex; }

    .hurray-text {
      font-size: 4rem;
      font-weight: bold;
      color: #e84393;
      text-shadow: 3px 3px 12px rgba(0,0,0,0.18);
      animation: hurray-bounce 0.55s ease-in-out infinite;
      text-align: center;
    }
    .hurray-sub {
      font-size: 1.4rem;
      color: #6c5ce7;
      margin-top: 12px;
      text-align: center;
      animation: hurray-bounce 0.55s ease-in-out infinite;
      animation-delay: 0.1s;
    }
    @keyframes hurray-bounce {
      0%, 100% { transform: scale(1) rotate(-2deg); }
      50%       { transform: scale(1.1) rotate(2deg); }
    }
  </style>
</head>
<body>
  <div class="bubble" style="width:160px;height:160px;background:#fd79a8;left:5%;animation-duration:14s;animation-delay:0s;"></div>
  <div class="bubble" style="width:90px;height:90px;background:#a29bfe;left:80%;animation-duration:10s;animation-delay:3s;"></div>
  <div class="bubble" style="width:120px;height:120px;background:#fdcb6e;left:55%;animation-duration:17s;animation-delay:1s;"></div>
  <div class="bubble" style="width:70px;height:70px;background:#55efc4;left:30%;animation-duration:12s;animation-delay:5s;"></div>
  <div class="bubble" style="width:100px;height:100px;background:#fd79a8;left:70%;animation-duration:9s;animation-delay:7s;"></div>

  <div class="title">I'm really sorry... 🥺</div>
  <div class="subtitle">Will you forgive me? 💕</div>

  <!-- Canvas for Otter Animation -->
  <canvas id="otterCanvas" width="500" height="550"></canvas>

  <div class="btn-area">
    <button class="btn" id="yes-btn">Yes, I forgive you! 💕</button>
    <button class="btn" id="no-btn">No 😤</button>
  </div>

  <div id="hurray">
    <div class="hurray-text">🎉 Hurray! 🎉</div>
    <div class="hurray-sub">Yay, she forgave me! 💖✨</div>
  </div>

  <script>
    const canvas = document.getElementById('otterCanvas');
    const ctx = canvas.getContext('2d');

    // ════════════════════════════════════════════════════════════════
    // OTTER OBJECT - Canvas-based with smooth animation
    // ════════════════════════════════════════════════════════════════

    const otter = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      headRotation: 0,
      targetHeadRotation: 0,
      eyeLookX: 0,
      eyeLookY: 0,
      targetEyeLookX: 0,
      targetEyeLookY: 0,
      breatheAmount: 0,
      blinkAmount: 0,
      blinkTimer: 0,
      blinkInterval: 3500,
      blinkDuration: 120,
      puffAmount: 0,
      happinessLevel: 0,
      isHappy: false,

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);

        // Breathing animation
        this.breatheAmount = Math.sin((Date.now() / 3200) * Math.PI * 2) * 0.08;
        const breatheScale = 1 + this.breatheAmount;

        // Smooth head rotation easing
        this.headRotation += (this.targetHeadRotation - this.headRotation) * 0.1;

        ctx.scale(breatheScale, breatheScale);

        // Draw body
        this.drawBody(ctx);
        
        // Draw head group (rotates)
        ctx.save();
        ctx.rotate(this.headRotation * Math.PI / 180);
        this.drawHead(ctx);
        ctx.restore();

        ctx.restore();
      },

      drawBody(ctx) {
        // Main body
        ctx.fillStyle = '#8B6F47';
        ctx.shadowColor = 'rgba(0,0,0,0.15)';
        ctx.shadowBlur = 15;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 5;
        
        // Body ellipse
        ctx.beginPath();
        ctx.ellipse(0, 40, 90, 75, 0, 0, Math.PI * 2);
        ctx.fill();

        // Belly lighter area
        ctx.fillStyle = '#E8D4C0';
        ctx.beginPath();
        ctx.ellipse(0, 40, 65, 55, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = 'transparent';

        // Tail - curved with gradient
        const tailGrad = ctx.createLinearGradient(150, 80, 180, -80);
        tailGrad.addColorStop(0, '#7D4F28');
        tailGrad.addColorStop(1, '#3D2410');
        ctx.strokeStyle = tailGrad;
        ctx.lineWidth = 32;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(80, 20);
        ctx.quadraticCurveTo(160, 0, 180, -120);
        ctx.stroke();

        // Back feet
        ctx.fillStyle = '#6B4423';
        ctx.beginPath();
        ctx.ellipse(-80, 110, 28, 32, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(80, 110, 28, 32, 0, 0, Math.PI * 2);
        ctx.fill();

        // Front arms
        ctx.strokeStyle = '#8B6F47';
        ctx.lineWidth = 24;

        ctx.beginPath();
        ctx.moveTo(-60, 0);
        ctx.quadraticCurveTo(-95, 40, -90, 100);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(60, 0);
        ctx.quadraticCurveTo(95, 40, 90, 100);
        ctx.stroke();

        // Front paws
        ctx.fillStyle = '#6B4423';
        ctx.beginPath();
        ctx.ellipse(-90, 110, 22, 20, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(90, 110, 22, 20, 0, 0, Math.PI * 2);
        ctx.fill();
      },

      drawHead(ctx) {
        // Main head
        const headGrad = ctx.createRadialGradient(-20, -40, 0, 0, 0, 120);
        headGrad.addColorStop(0, '#D4A574');
        headGrad.addColorStop(0.5, '#9D6F42');
        headGrad.addColorStop(1, '#5D3A1A');
        ctx.fillStyle = headGrad;

        ctx.beginPath();
        ctx.arc(0, 0, 95, 0, Math.PI * 2);
        ctx.fill();

        // Ears
        const earColor = '#A67C52';
        ctx.fillStyle = earColor;
        ctx.beginPath();
        ctx.arc(-70, -75, 32, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(70, -75, 32, 0, Math.PI * 2);
        ctx.fill();

        // Ear inner
        ctx.fillStyle = '#D9C7B3';
        ctx.beginPath();
        ctx.arc(-70, -75, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(70, -75, 18, 0, Math.PI * 2);
        ctx.fill();

        // Muzzle
        const muzzleGrad = ctx.createRadialGradient(0, 20, 0, 0, 40, 80);
        muzzleGrad.addColorStop(0, '#F8EAD6');
        muzzleGrad.addColorStop(1, '#D9C7B3');
        ctx.fillStyle = muzzleGrad;
        ctx.beginPath();
        ctx.ellipse(0, 30, 70, 75, 0, 0, Math.PI * 2);
        ctx.fill();

        // Eyes
        this.drawEyes(ctx);

        // Nose
        ctx.fillStyle = '#5D3A1A';
        ctx.beginPath();
        ctx.ellipse(0, 32, 14, 11, 0, 0, Math.PI * 2);
        ctx.fill();

        // Mouth
        const mouthOffset = this.isHappy ? 15 : 0;
        ctx.strokeStyle = '#5D3A1A';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.quadraticCurveTo(0, 50 + mouthOffset, 15, 50);
        ctx.stroke();
        ctx.beginPath();
        ctx.quadraticCurveTo(0, 50 + mouthOffset, -15, 50);
        ctx.stroke();

        // Whiskers
        ctx.strokeStyle = 'rgba(74, 50, 25, 0.75)';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';

        const whiskerPhase = Math.sin(Date.now() / 2500 * Math.PI * 2) * 2;

        // Left whiskers
        ctx.beginPath();
        ctx.moveTo(-35, 5);
        ctx.lineTo(-95, -5 + whiskerPhase);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-40, 20);
        ctx.lineTo(-105, 20 + whiskerPhase);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-35, 40);
        ctx.lineTo(-95, 50 + whiskerPhase);
        ctx.stroke();

        // Right whiskers
        ctx.beginPath();
        ctx.moveTo(35, 5);
        ctx.lineTo(95, -5 + whiskerPhase);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(40, 20);
        ctx.lineTo(105, 20 + whiskerPhase);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(35, 40);
        ctx.lineTo(95, 50 + whiskerPhase);
        ctx.stroke();

        // Blush
        ctx.fillStyle = `rgba(255, 182, 217, ${0.35 + Math.sin(Date.now() / 2900 * Math.PI * 2) * 0.1})`;
        ctx.beginPath();
        ctx.ellipse(-55, 10, 24, 20, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(55, 10, 24, 20, 0, 0, Math.PI * 2);
        ctx.fill();
      },

      drawEyes(ctx) {
        const eyeYOffset = -30;
        const eyeDistance = 50;

        // Smooth eye look easing
        this.eyeLookX += (this.targetEyeLookX - this.eyeLookX) * 0.15;
        this.eyeLookY += (this.targetEyeLookY - this.eyeLookY) * 0.15;

        this.drawSingleEye(ctx, -eyeDistance, eyeYOffset, this.eyeLookX - 0.3, this.eyeLookY);
        this.drawSingleEye(ctx, eyeDistance, eyeYOffset, this.eyeLookX + 0.3, this.eyeLookY);
      },

      drawSingleEye(ctx, eyeX, eyeY, lookX, lookY) {
        // Eye white
        ctx.fillStyle = '#FFFFFF';
        ctx.shadowColor = 'rgba(0,0,0,0.1)';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(eyeX, eyeY, 32, 0, Math.PI * 2);
        ctx.fill();

        // Iris
        const irisGrad = ctx.createRadialGradient(eyeX - 8, eyeY - 8, 0, eyeX, eyeY, 25);
        irisGrad.addColorStop(0, '#5D7E9F');
        irisGrad.addColorStop(0.7, '#3D5F8F');
        irisGrad.addColorStop(1, '#1A2D4A');
        ctx.fillStyle = irisGrad;

        const irisOffsetX = lookX * 12;
        const irisOffsetY = lookY * 12;

        ctx.beginPath();
        ctx.arc(eyeX + irisOffsetX, eyeY + irisOffsetY, 20, 0, Math.PI * 2);
        ctx.fill();

        // Pupil
        ctx.fillStyle = '#0F1419';
        ctx.beginPath();
        ctx.arc(eyeX + irisOffsetX + 2, eyeY + irisOffsetY + 2, 13, 0, Math.PI * 2);
        ctx.fill();

        // Shine
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.beginPath();
        ctx.arc(eyeX + irisOffsetX - 6, eyeY + irisOffsetY - 8, 7, 0, Math.PI * 2);
        ctx.fill();

        // Eyelids (for blinking)
        if (this.blinkAmount > 0) {
          ctx.fillStyle = '#A67C52';
          ctx.beginPath();
          ctx.ellipse(eyeX, eyeY - 35, 32, 22, 0, 0, Math.PI);
          ctx.fill();

          ctx.beginPath();
          ctx.ellipse(eyeX, eyeY + 35, 32, 18, Math.PI, 0);
          ctx.fill();
        }
      }
    };

    // ════════════════════════════════════════════════════════════════
    // ANIMATION LOOP
    // ════════════════════════════════════════════════════════════════

    let mouseX = canvas.width / 2;
    let mouseY = canvas.height / 2;
    let isTracking = true;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      if (!isTracking) return;

      // Calculate eye look direction
      const rect = canvas.getBoundingClientRect();
      const canvasCenterX = rect.left + rect.width / 2;
      const canvasCenterY = rect.top + rect.height / 2;

      const dx = mouseX - canvasCenterX;
      const dy = mouseY - canvasCenterY;
      const dist = Math.hypot(dx, dy);

      otter.targetEyeLookX = Math.max(-1, Math.min(1, dx / 300));
      otter.targetEyeLookY = Math.max(-1, Math.min(1, dy / 300));

      // Head rotation
      const angle = Math.atan2(dy, dx);
      otter.targetHeadRotation = Math.max(-35, Math.min(35, angle * 180 / Math.PI - 90));
    });

    // Blinking
    setInterval(() => {
      if (!isTracking || otter.isHappy) return;
      if (Math.random() > 0.3) {
        let blinkStart = Date.now();
        const blinkLoop = setInterval(() => {
          const elapsed = Date.now() - blinkStart;
          otter.blinkAmount = Math.sin((elapsed / otter.blinkDuration) * Math.PI);
          if (elapsed > otter.blinkDuration) {
            clearInterval(blinkLoop);
            otter.blinkAmount = 0;
          }
        }, 16);
      }
    }, 3500 + Math.random() * 1500);

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Float animation
      const floatAmount = Math.sin(Date.now() / 4200 * Math.PI * 2) * 15;
      const oldY = otter.y;
      otter.y = canvas.height / 2 + floatAmount;

      otter.draw(ctx);

      otter.y = oldY;
      requestAnimationFrame(animate);
    }
    animate();

    // ════════════════════════════════════════════════════════════════
    // BUTTON HANDLERS
    // ════════════════════════════════════════════════════════════════

    const noBtn = document.getElementById('no-btn');
    let noBtnReady = false;

    function launchNoBtn() {
      if (!noBtnReady) {
        const r = noBtn.getBoundingClientRect();
        noBtn.style.position = 'fixed';
        noBtn.style.margin = '0';
        noBtn.style.left = r.left + 'px';
        noBtn.style.top = r.top + 'px';
        noBtnReady = true;
      }
      const pad = 30;
      const w = noBtn.offsetWidth;
      const h = noBtn.offsetHeight;
      const x = Math.random() * (window.innerWidth - w - pad * 2) + pad;
      const y = Math.random() * (window.innerHeight - h - pad * 2) + pad;
      noBtn.style.transition = 'left 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94), top 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    }

    noBtn.addEventListener('mousemove', launchNoBtn);
    noBtn.addEventListener('touchstart', launchNoBtn, { passive: true });
    noBtn.addEventListener('click', launchNoBtn);

    document.getElementById('yes-btn').addEventListener('click', function () {
      isTracking = false;
      otter.isHappy = true;
      otter.targetHeadRotation = 0;
      otter.targetEyeLookX = 0;
      otter.targetEyeLookY = 0;

      // Hide buttons
      document.querySelector('.btn-area').style.display = 'none';

      // Show celebration
      document.getElementById('hurray').classList.add('show');

      // Petal shower
      const emojis = ['🌸','🌺','🌼','🌻','💐','🌷','💕','💖','✨','🎉','🎊','💗','🩷','🌈','🦦'];
      let count = 0;
      const id = setInterval(() => {
        const el = document.createElement('div');
        el.className = 'petal';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (Math.random() * 1.8 + 0.9) + 'rem';
        el.style.animationDuration = (Math.random() * 3.2 + 2.2) + 's';
        el.style.animationDelay = Math.random() * 1.0 + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 7000);

        count++;
        if (count >= 120) clearInterval(id);
      }, 50);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I'm Sorry 🦦💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff0f8 0%, #fde2f0 40%, #ffecd2 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
      user-select: none;
    }

    /* Animated background bubbles */
    .bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.15;
      animation: drift linear infinite;
      pointer-events: none;
    }
    @keyframes drift {
      0%   { transform: translateY(110vh) scale(1); }
      100% { transform: translateY(-20vh) scale(1.1); }
    }

    .title {
      font-size: 2.3rem;
      color: #c0392b;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.12);
      margin-bottom: 8px;
      animation: pulse 2.5s ease-in-out infinite;
      text-align: center;
      z-index: 1;
    }
    .subtitle {
      font-size: 1.15rem;
      color: #7f6250;
      margin-bottom: 18px;
      text-align: center;
      z-index: 1;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    #otter-wrap {
      width: 320px;
      height: 385px;
      animation: float-elite 4.2s cubic-bezier(0.4, 0.0, 0.6, 1.0) infinite;
      cursor: none;
      z-index: 1;
      filter: drop-shadow(0 12px 32px rgba(0,0,0,0.18));
    }
    @keyframes float-elite {
      0%, 100% { transform: translateY(0) scale(1); }
      25%      { transform: translateY(-22px) scale(1.03); }
      50%      { transform: translateY(-10px) scale(1); }
      75%      { transform: translateY(-18px) scale(1.01); }
    }
    .otter-happy-bounce {
      animation: happy-dance 0.5s ease-in-out infinite !important;
    }
    @keyframes happy-dance {
      0%, 100% { transform: scale(1) rotate(-3deg); }
      50%       { transform: scale(1.07) rotate(3deg); }
    }

    .btn-area {
      display: flex;
      gap: 22px;
      margin-top: 24px;
      z-index: 1;
    }
    .btn {
      padding: 14px 34px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      font-family: inherit;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }

    #yes-btn {
      background: linear-gradient(135deg, #fd79a8, #e84393);
      color: white;
    }
    #no-btn {
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      color: white;
      position: relative; /* becomes fixed on first hover */
    }

    /* Falling flowers */
    .petal {
      position: fixed;
      pointer-events: none;
      top: -60px;
      z-index: 900;
      animation: petal-fall linear forwards;
    }
    @keyframes petal-fall {
      0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(115vh) rotate(600deg) scale(0.8); opacity: 0; }
    }

    /* Hurray overlay */
    #hurray {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 950;
      pointer-events: none;
    }
    #hurray.show { display: flex; }

    .hurray-text {
      font-size: 4rem;
      font-weight: bold;
      color: #e84393;
      text-shadow: 3px 3px 12px rgba(0,0,0,0.18);
      animation: hurray-bounce 0.55s ease-in-out infinite;
      text-align: center;
    }
    .hurray-sub {
      font-size: 1.4rem;
      color: #6c5ce7;
      margin-top: 12px;
      text-align: center;
      animation: hurray-bounce 0.55s ease-in-out infinite;
      animation-delay: 0.1s;
    }
    @keyframes hurray-bounce {
      0%, 100% { transform: scale(1) rotate(-2deg); }
      50%       { transform: scale(1.1) rotate(2deg); }
    }
  </style>
</head>

  <script>
    /* ══════════════════════════════════════════════════════════════
       ELITE OTTER ANIMATION SYSTEM - PROFESSIONAL QUALITY
       ══════════════════════════════════════════════════════════════ */

    const svg = document.getElementById('otter');
    const headGroup = document.getElementById('head-group');
    const bodyGroup = document.getElementById('body-group');
    const armsGroup = document.getElementById('arms-group');
    const whiskers = document.querySelectorAll('.whisker');
    
    // Eye elements (LEFT EYE at transform translate(-42, -25))
    const lPupil = document.getElementById('l-pupil');
    const rPupil = document.getElementById('r-pupil');
    const lIris = document.getElementById('l-iris');
    const rIris = document.getElementById('r-iris');
    const lEyelidTop = document.getElementById('l-eyelid-top');
    const rEyelidTop = document.getElementById('r-eyelid-top');
    const lEyelidBottom = document.getElementById('l-eyelid-bottom');
    const rEyelidBottom = document.getElementById('r-eyelid-bottom');

    // Eye centers in NEW coordinates (transform group offsets applied)
    const eyeL = { x: -42, y: -25, localX: 0, localY: 0 };  // position in left-eye transform
    const eyeR = { x: 42, y: -25, localX: 0, localY: 0 };   // position in right-eye transform

    const MAX_IRIS = 10;
    const MAX_PUPIL = 14;

    // ── SMOOTH EYE TRACKING ──
    let currentMouseX = window.innerWidth / 2;
    let currentMouseY = window.innerHeight / 2;
    let trackingActive = true;

    function calcEyeOffset(localEyeX, localEyeY, mx, my, max) {
      const dx = mx - localEyeX;
      const dy = my - localEyeY;
      const dist = Math.hypot(dx, dy);
      const capped = Math.min(max, dist * max / 70);
      const angle = Math.atan2(dy, dx);
      return {
        x: localEyeX + Math.cos(angle) * capped,
        y: localEyeY + Math.sin(angle) * capped
      };
    }

    document.addEventListener('mousemove', (e) => {
      currentMouseX = e.clientX;
      currentMouseY = e.clientY;
    });

    // Animation loop for smooth eye tracking
    let animationFrameId = null;
    function updateEyes() {
      if (!trackingActive) return;

      const rect = svg.getBoundingClientRect();
      const scaleX = 400 / rect.width;   // viewBox width
      const scaleY = 480 / rect.height;  // viewBox height
      
      // Convert mouse to SVG coordinates
      const svgMx = (currentMouseX - rect.left) * scaleX;
      const svgMy = (currentMouseY - rect.top) * scaleY;
      
      // Relative to head center (210, 140)
      const relMx = svgMx - 210;
      const relMy = svgMy - 140;

      // Calculate eye movement
      const lP = calcEyeOffset(eyeL.localX, eyeL.localY, relMx, relMy, MAX_PUPIL);
      const rP = calcEyeOffset(eyeR.localX, eyeR.localY, relMx, relMy, MAX_PUPIL);
      const lI = calcEyeOffset(eyeL.localX, eyeL.localY, relMx, relMy, MAX_IRIS);
      const rI = calcEyeOffset(eyeR.localX, eyeR.localY, relMx, relMy, MAX_IRIS);

      lPupil.setAttribute('cx', lP.x);
      lPupil.setAttribute('cy', lP.y);
      rPupil.setAttribute('cx', rP.x);
      rPupil.setAttribute('cy', rP.y);
      lIris.setAttribute('cx', lI.x);
      lIris.setAttribute('cy', lI.y);
      rIris.setAttribute('cx', rI.x);
      rIris.setAttribute('cy', rI.y);

      // HEAD ROTATION for smooth tracking
      const angle = Math.atan2(relMy, relMx);
      let headRot = angle * 180 / Math.PI;
      headRot = Math.max(-32, Math.min(32, headRot));
      headGroup.setAttribute('transform', `translate(210, 140) rotate(${headRot})`);

      animationFrameId = requestAnimationFrame(updateEyes);
    }
    updateEyes();

    // ── BLINKING - Realistic with eased animation ──
    let blinkCount = 0;
    const BLINK_INTERVAL = 3500 + Math.random() * 1500;
    const BLINK_DURATION = 120;

    function performBlink() {
      const startTime = Date.now();
      
      const blinkInterval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(1, elapsed / BLINK_DURATION);
        // Smooth sine easing for natural blink
        const easeProgress = Math.sin(progress * Math.PI);

        lEyelidTop.setAttribute('opacity', easeProgress * 0.95);
        rEyelidTop.setAttribute('opacity', easeProgress * 0.95);
        lEyelidBottom.setAttribute('opacity', easeProgress * 0.85);
        rEyelidBottom.setAttribute('opacity', easeProgress * 0.85);

        if (elapsed > BLINK_DURATION) {
          clearInterval(blinkInterval);
          lEyelidTop.setAttribute('opacity', '0');
          rEyelidTop.setAttribute('opacity', '0');
          lEyelidBottom.setAttribute('opacity', '0');
          rEyelidBottom.setAttribute('opacity', '0');
        }
      }, 16);
    }

    // Start automated blinking
    setInterval(() => {
      if (trackingActive && Math.random() > 0.25) {
        performBlink();
      }
    }, BLINK_INTERVAL);

    // ── BODY BREATHING (subtle chest movement) ──
    let breathStartTime = Date.now();
    setInterval(() => {
      const elapsed = Date.now() - breathStartTime;
      const breathAmount = Math.sin((elapsed / 3200) * Math.PI * 2) * 0.08;
      const breatheScale = 1 + breathAmount;
      bodyGroup.style.transform = `scaleY(${breatheScale})`;
    }, 16);

    // ── ARM GENTLE SWAYING ──
    let armWaveStart = Date.now();
    const leftArm = document.getElementById('left-arm');
    const rightArm = document.getElementById('right-arm');
    
    setInterval(() => {
      const elapsed = Date.now() - armWaveStart;
      const waveAngle = (elapsed / 4500) * Math.PI * 2;
      const waveAmt = Math.sin(waveAngle) * 2.5;
      leftArm.style.transform = `rotate(${waveAmt}deg)`;
      rightArm.style.transform = `rotate(${-waveAmt}deg)`;
    }, 16);

    // ── WHISKER FLUTTER ──
    let flutterStart = Date.now();
    setInterval(() => {
      const elapsed = Date.now() - flutterStart;
      const flutter = Math.sin((elapsed / 2600) * Math.PI * 2) * 1.1;
      whiskers.forEach((w, idx) => {
        const offsetAngle = (idx * 60);  // stagger whiskers
        const x1 = parseFloat(w.getAttribute('x1'));
        w.style.transformOrigin = x1 + ' ' + w.getAttribute('y1');
        w.style.transform = `rotate(${flutter}deg)`;
      });
    }, 16);

    // ── BLUSH PULSING ──
    let blushStart = Date.now();
    setInterval(() => {
      const elapsed = Date.now() - blushStart;
      const cheeks = document.querySelectorAll('#cheeks circle');
      const pulse = Math.sin((elapsed / 2900) * Math.PI * 2);
      cheeks.forEach((cheek, idx) => {
        const baseOp = idx < 2 ? 0.38 : 0.25;
        const op = baseOp + pulse * 0.12;
        cheek.setAttribute('opacity', op);
      });
    }, 16);

    /* ── NO BUTTON ESCAPE ── */
    const noBtn = document.getElementById('no-btn');
    let noBtnReady = false;

    function launchNoBtn() {
      if (!noBtnReady) {
        const r = noBtn.getBoundingClientRect();
        noBtn.style.position = 'fixed';
        noBtn.style.margin = '0';
        noBtn.style.left = r.left + 'px';
        noBtn.style.top = r.top + 'px';
        noBtnReady = true;
      }
      const pad = 30;
      const w = noBtn.offsetWidth;
      const h = noBtn.offsetHeight;
      const x = Math.random() * (window.innerWidth - w - pad * 2) + pad;
      const y = Math.random() * (window.innerHeight - h - pad * 2) + pad;
      noBtn.style.transition = 'left 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94), top 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    }

    noBtn.addEventListener('mousemove', launchNoBtn);
    noBtn.addEventListener('touchstart', launchNoBtn, { passive: true });
    noBtn.addEventListener('click', launchNoBtn);

    /* ── YES BUTTON - CELEBRATION ── */
    document.getElementById('yes-btn').addEventListener('click', function () {
      trackingActive = false;

      // Happy mouth animation
      const mouth = document.getElementById('mouth-line');
      mouth.setAttribute('d', 'M -10 40 Q 0 55 10 40');

      // Swap to happy eyes (squinty, joyful)
      document.getElementById('l-eye').style.display = 'none';
      document.getElementById('r-eye').style.display = 'none';
      document.getElementById('happy-eyes').setAttribute('visibility', 'visible');

      // Reset head to center with bounce
      let bounceFrame = 0;
      const bounceAnim = setInterval(() => {
        const bounceHeight = Math.sin(bounceFrame / 8 * Math.PI) * 12;
        headGroup.setAttribute('transform', `translate(210, 140) rotate(0) translateY(${-bounceHeight})`);
        bounceFrame++;
        if (bounceFrame > 8) {
          clearInterval(bounceAnim);
          headGroup.setAttribute('transform', `translate(210, 140) rotate(0)`);
        }
      }, 35);

      // Puff chest
      bodyGroup.style.transform = 'scaleY(1.12)';
      
      // Update sign text
      document.getElementById('sign-txt').textContent = 'Thank you! 💖';

      // Celebration bounce
      document.getElementById('otter-wrap').style.animation = 'happy-bounce 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite';

      // Hide buttons
      document.querySelector('.btn-area').style.display = 'none';

      // Show celebration text
      document.getElementById('hurray').classList.add('show');

      // PETAL SHOWER
      const emojis = ['🌸','🌺','🌼','🌻','💐','🌷','💕','💖','✨','🎉','🎊','💗','🩷','🌈','🦦'];
      let count = 0;
      const id = setInterval(() => {
        spawnPetal(emojis);
        count++;
        if (count >= 120) clearInterval(id);
      }, 50);

      cancelAnimationFrame(animationFrameId);
    });

    // Add happy bounce keyframe
    const style = document.createElement('style');
    style.textContent = `
      @keyframes happy-bounce {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-28px) scale(1.12); }
      }
    `;
    document.head.appendChild(style);

    function spawnPetal(emojis) {
      const el = document.createElement('div');
      el.className = 'petal';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (Math.random() * 1.8 + 0.9) + 'rem';
      el.style.animationDuration = (Math.random() * 3.2 + 2.2) + 's';
      el.style.animationDelay = Math.random() * 1.0 + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 7000);
    }
  </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I'm Sorry 🦦💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff0f8 0%, #fde2f0 40%, #ffecd2 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
      user-select: none;
    }

    /* Animated background bubbles */
    .bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.15;
      animation: drift linear infinite;
      pointer-events: none;
    }
    @keyframes drift {
      0%   { transform: translateY(110vh) scale(1); }
      100% { transform: translateY(-20vh) scale(1.1); }
    }

    .title {
      font-size: 2.3rem;
      color: #c0392b;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.12);
      margin-bottom: 8px;
      animation: pulse 2.5s ease-in-out infinite;
      text-align: center;
      z-index: 1;
    }
    .subtitle {
      font-size: 1.15rem;
      color: #7f6250;
      margin-bottom: 18px;
      text-align: center;
      z-index: 1;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    #otter-wrap {
      width: 270px;
      height: 310px;
      animation: float 3.2s ease-in-out infinite;
      cursor: none;
      z-index: 1;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-13px); }
    }
    .otter-happy-bounce {
      animation: happy-dance 0.5s ease-in-out infinite !important;
    }
    @keyframes happy-dance {
      0%, 100% { transform: scale(1) rotate(-3deg); }
      50%       { transform: scale(1.07) rotate(3deg); }
    }

    .btn-area {
      display: flex;
      gap: 22px;
      margin-top: 24px;
      z-index: 1;
    }
    .btn {
      padding: 14px 34px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      font-family: inherit;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }

    #yes-btn {
      background: linear-gradient(135deg, #fd79a8, #e84393);
      color: white;
    }
    #no-btn {
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      color: white;
      position: relative; /* becomes fixed on first hover */
    }

    /* Falling flowers */
    .petal {
      position: fixed;
      pointer-events: none;
      top: -60px;
      z-index: 900;
      animation: petal-fall linear forwards;
    }
    @keyframes petal-fall {
      0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(115vh) rotate(600deg) scale(0.8); opacity: 0; }
    }

    /* Hurray overlay */
    #hurray {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 950;
      pointer-events: none;
    }
    #hurray.show { display: flex; }

    .hurray-text {
      font-size: 4rem;
      font-weight: bold;
      color: #e84393;
      text-shadow: 3px 3px 12px rgba(0,0,0,0.18);
      animation: hurray-bounce 0.55s ease-in-out infinite;
      text-align: center;
    }
    .hurray-sub {
      font-size: 1.4rem;
      color: #6c5ce7;
      margin-top: 12px;
      text-align: center;
      animation: hurray-bounce 0.55s ease-in-out infinite;
      animation-delay: 0.1s;
    }
    @keyframes hurray-bounce {
      0%, 100% { transform: scale(1) rotate(-2deg); }
      50%       { transform: scale(1.1) rotate(2deg); }
    }
  </style>
</head>
<body>

  <!-- Soft floating background bubbles -->
  <div class="bubble" style="width:160px;height:160px;background:#fd79a8;left:5%;animation-duration:14s;animation-delay:0s;"></div>
  <div class="bubble" style="width:90px;height:90px;background:#a29bfe;left:80%;animation-duration:10s;animation-delay:3s;"></div>
  <div class="bubble" style="width:120px;height:120px;background:#fdcb6e;left:55%;animation-duration:17s;animation-delay:1s;"></div>
  <div class="bubble" style="width:70px;height:70px;background:#55efc4;left:30%;animation-duration:12s;animation-delay:5s;"></div>
  <div class="bubble" style="width:100px;height:100px;background:#fd79a8;left:70%;animation-duration:9s;animation-delay:7s;"></div>

  <div class="title">I'm really sorry... 🥺</div>
  <div class="subtitle">Will you forgive me? 💕</div>

  <!-- SVG Otter -->
  <div id="otter-wrap">
    <g id="body-tilt-group">
      <svg id="otter" viewBox="0 0 300 350" xmlns="http://www.w3.org/2000/svg">

        <!-- Tail - more curved and realistic -->
        <path d="M 220 280 Q 240 260 250 240 Q 260 220 255 200" stroke="#8B5A2B" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <ellipse cx="255" cy="198" rx="16" ry="14" fill="#8B5A2B"/>

        <!-- Back legs -->
        <ellipse cx="100" cy="295" rx="22" ry="28" fill="#8B5A2B"/>
        <ellipse cx="100" cy="320" rx="18" ry="12" fill="#6B4423"/>
        <ellipse cx="190" cy="295" rx="22" ry="28" fill="#8B5A2B"/>
        <ellipse cx="190" cy="320" rx="18" ry="12" fill="#6B4423"/>

        <!-- Body -->
        <ellipse cx="145" cy="270" rx="78" ry="62" fill="#8B5A2B"/>
        <!-- Belly -->
        <ellipse cx="145" cy="275" rx="52" ry="45" fill="#C4A578"/>

        <!-- Chest/Neck area -->
        <ellipse cx="145" cy="200" rx="65" ry="55" fill="#8B5A2B"/>
        <ellipse cx="145" cy="210" rx="48" ry="40" fill="#C4A578"/>

        <!-- Head group (will rotate) -->
        <g id="head-group" transform="translate(145, 140)">
          <!-- Head base -->
          <circle cx="0" cy="0" r="85" fill="#8B5A2B"/>
          
          <!-- Left ear -->
          <circle cx="-65" cy="-65" r="28" fill="#8B5A2B"/>
          <circle cx="-65" cy="-65" r="16" fill="#C4A578"/>
          <ellipse cx="-65" cy="-62" rx="6" ry="8" fill="#6B4423" opacity="0.6"/>
          
          <!-- Right ear -->
          <circle cx="65" cy="-65" r="28" fill="#8B5A2B"/>
          <circle cx="65" cy="-65" r="16" fill="#C4A578"/>
          <ellipse cx="65" cy="-62" rx="6" ry="8" fill="#6B4423" opacity="0.6"/>

          <!-- Muzzle - defined otter snout -->
          <ellipse cx="0" cy="18" rx="48" ry="52" fill="#C4A578"/>
          
          <!-- Chin definition -->
          <ellipse cx="0" cy="35" rx="42" ry="30" fill="#B39568"/>

          <!-- Whiskers (left) -->
          <line x1="-30" y1="15" x2="-60" y2="5" stroke="#5D3A1A" stroke-width="2" stroke-linecap="round"/>
          <line x1="-32" y1="25" x2="-65" y2="20" stroke="#5D3A1A" stroke-width="2" stroke-linecap="round"/>
          <line x1="-30" y1="35" x2="-60" y2="40" stroke="#5D3A1A" stroke-width="2" stroke-linecap="round"/>

          <!-- Whiskers (right) -->
          <line x1="30" y1="15" x2="60" y2="5" stroke="#5D3A1A" stroke-width="2" stroke-linecap="round"/>
          <line x1="32" y1="25" x2="65" y2="20" stroke="#5D3A1A" stroke-width="2" stroke-linecap="round"/>
          <line x1="30" y1="35" x2="60" y2="40" stroke="#5D3A1A" stroke-width="2" stroke-linecap="round"/>

          <!-- Blush cheeks -->
          <circle cx="-45" cy="8" r="20" fill="#FF8FAB" opacity="0.45"/>
          <circle cx="45" cy="8" r="20" fill="#FF8FAB" opacity="0.45"/>

          <!-- Nose -->
          <ellipse cx="0" cy="28" rx="11" ry="8" fill="#5D3A1A"/>
          <ellipse cx="-3" cy="26" rx="3" ry="2" fill="#2C1810" opacity="0.8"/>

          <!-- Mouth — sorry / slightly sad -->
          <path id="mouth" d="M -18 38 Q 0 28 18 38" stroke="#5D3A1A" stroke-width="3" fill="none" stroke-linecap="round"/>

          <!-- ── LEFT EYE ── -->
          <g id="l-eye-group">
            <circle cx="-28" cy="-12" r="28" fill="white"/>
            <circle id="l-iris" cx="-28" cy="-12" r="18" fill="#2C5F8D"/>
            <circle id="l-pupil" cx="-28" cy="-12" r="11" fill="#0F1419"/>
            <!-- Shine -->
            <circle cx="-18" cy="-22" r="5" fill="white" opacity="0.94"/>
            <circle cx="-35" cy="-2" r="3" fill="white" opacity="0.75"/>
            <!-- Outline -->
            <circle cx="-28" cy="-12" r="28" fill="none" stroke="#4A3219" stroke-width="2.5"/>
          </g>

          <!-- ── RIGHT EYE ── -->
          <g id="r-eye-group">
            <circle cx="28" cy="-12" r="28" fill="white"/>
            <circle id="r-iris" cx="28" cy="-12" r="18" fill="#2C5F8D"/>
            <circle id="r-pupil" cx="28" cy="-12" r="11" fill="#0F1419"/>
            <!-- Shine -->
            <circle cx="38" cy="-22" r="5" fill="white" opacity="0.94"/>
            <circle cx="21" cy="-2" r="3" fill="white" opacity="0.75"/>
            <!-- Outline -->
            <circle cx="28" cy="-12" r="28" fill="none" stroke="#4A3219" stroke-width="2.5"/>
          </g>

          <!-- Happy eye overlay (hidden) -->
          <g id="l-happy-eye" visibility="hidden">
            <circle cx="-28" cy="-12" r="28" fill="#C4A578"/>
            <path d="M -55 -12 Q -28 -35 -1 -12 Q -28 5 -55 -12" fill="white" stroke="#4A3219" stroke-width="2.5"/>
            <circle cx="-28" cy="-5" r="9" fill="#2C5F8D"/>
            <circle cx="-28" cy="-5" r="6" fill="#0F1419"/>
            <circle cx="-22" cy="-10" r="3" fill="white" opacity="0.92"/>
          </g>
          <g id="r-happy-eye" visibility="hidden">
            <circle cx="28" cy="-12" r="28" fill="#C4A578"/>
            <path d="M 1 -12 Q 28 -35 55 -12 Q 28 5 1 -12" fill="white" stroke="#4A3219" stroke-width="2.5"/>
            <circle cx="28" cy="-5" r="9" fill="#2C5F8D"/>
            <circle cx="28" cy="-5" r="6" fill="#0F1419"/>
            <circle cx="34" cy="-10" r="3" fill="white" opacity="0.92"/>
          </g>
        </g>

        <!-- Front left arm -->
        <path d="M 85 250 Q 55 270 45 295" stroke="#8B5A2B" stroke-width="18" fill="none" stroke-linecap="round"/>
        <ellipse cx="42" cy="305" rx="18" ry="16" fill="#8B5A2B"/>
        <ellipse cx="38" cy="310" rx="14" ry="10" fill="#6B4423"/>

        <!-- Front right arm -->
        <path d="M 205 250 Q 235 270 245 295" stroke="#8B5A2B" stroke-width="18" fill="none" stroke-linecap="round"/>
        <ellipse cx="248" cy="305" rx="18" ry="16" fill="#8B5A2B"/>
        <ellipse cx="252" cy="310" rx="14" ry="10" fill="#6B4423"/>

        <!-- Sign - larger and more visible -->
        <rect x="80" y="315" width="130" height="50" rx="10" fill="#FFFACD" stroke="#FFD700" stroke-width="3.5"/>
        <text id="sign-txt" x="145" y="348"
              text-anchor="middle" font-size="16" font-weight="bold" fill="#e84393"
              font-family="Georgia,serif">I'm Sorry! 💕</text>

      </svg>
    </g>
  </div>

  <div class="btn-area">
    <button class="btn" id="yes-btn">Yes, I forgive you! 💕</button>
    <button class="btn" id="no-btn">No 😤</button>
  </div>

  <div id="hurray">
    <div class="hurray-text">🎉 Hurray! 🎉</div>
    <div class="hurray-sub">Yay, she forgave me! 💖✨</div>
  </div>

  <script>
    /* ── Eye Tracking & Body Movement ── */
    const svg            = document.getElementById('otter');
    const headGroup      = document.getElementById('head-group');
    const bodyTiltGroup  = document.getElementById('body-tilt-group');
    const lIris          = document.getElementById('l-iris');
    const rIris          = document.getElementById('r-iris');
    const lPupil         = document.getElementById('l-pupil');
    const rPupil         = document.getElementById('r-pupil');

    // Eye centres in NEW viewBox coordinates
    const L = { x: -28, y: -12 };  // relative to head-group center
    const R = { x: 28, y: -12 };

    const MAX_IRIS  = 7;
    const MAX_PUPIL = 9;

    function calcOffset(eyeX, eyeY, mxSVG, mySVG, max) {
      const dx    = mxSVG - eyeX;
      const dy    = mySVG - eyeY;
      const hyp   = Math.hypot(dx, dy);
      const dist  = Math.min(max, hyp * max / 60);
      const angle = Math.atan2(dy, dx);
      return { 
        x: eyeX + Math.cos(angle) * dist,
        y: eyeY + Math.sin(angle) * dist 
      };
    }

    let eyesActive = true;

    document.addEventListener('mousemove', function (e) {
      if (!eyesActive) return;
      
      const rect   = svg.getBoundingClientRect();
      const scaleX = 300 / rect.width;   // Updated viewBox width
      const scaleY = 350 / rect.height;  // Updated viewBox height
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;

      // Head group center in viewBox = (145, 140)
      const headCenterX = 145;
      const headCenterY = 140;

      // Eye tracking with new coordinates
      const lP = calcOffset(L.x, L.y, mx - headCenterX, my - headCenterY, MAX_PUPIL);
      const rP = calcOffset(R.x, R.y, mx - headCenterX, my - headCenterY, MAX_PUPIL);
      const lI = calcOffset(L.x, L.y, mx - headCenterX, my - headCenterY, MAX_IRIS);
      const rI = calcOffset(R.x, R.y, mx - headCenterX, my - headCenterY, MAX_IRIS);

      lPupil.setAttribute('cx', lP.x);
      lPupil.setAttribute('cy', lP.y);
      rPupil.setAttribute('cx', rP.x);
      rPupil.setAttribute('cy', rP.y);
      lIris.setAttribute('cx', lI.x);
      lIris.setAttribute('cy', lI.y);
      rIris.setAttribute('cx', rI.x);
      rIris.setAttribute('cy', rI.y);

      // ── HEAD ROTATION ──
      // Calculate angle from otter center to cursor
      const dx = mx - headCenterX;
      const dy = my - headCenterY;
      const angle = Math.atan2(dy, dx); // in radians
      
      // Clamp rotation to ±25 degrees for natural look
      const maxHeadRotation = 25;
      let headRotation = (angle * 180 / Math.PI);
      headRotation = Math.max(-maxHeadRotation, Math.min(maxHeadRotation, headRotation));
      
      headGroup.setAttribute('transform', `translate(145, 140) rotate(${headRotation})`);

      // ── BODY TILT ──
      // Slight shoulder/body lean following the head movement
      const bodyTilt = headRotation * 0.35; // less aggressive than head
      bodyTiltGroup.style.transform = `rotate(${bodyTilt}deg)`;
      bodyTiltGroup.style.transformOrigin = '50% 50%';
    });

    /* ── No Button Escape ── */
    const noBtn = document.getElementById('no-btn');
    let noBtnReady = false;

    function launchNoBtn() {
      if (!noBtnReady) {
        const r = noBtn.getBoundingClientRect();
        noBtn.style.position = 'fixed';
        noBtn.style.margin   = '0';
        noBtn.style.left     = r.left + 'px';
        noBtn.style.top      = r.top  + 'px';
        noBtnReady = true;
      }
      const pad = 30;
      const w   = noBtn.offsetWidth;
      const h   = noBtn.offsetHeight;
      const x   = Math.random() * (window.innerWidth  - w - pad * 2) + pad;
      const y   = Math.random() * (window.innerHeight - h - pad * 2) + pad;
      noBtn.style.transition = 'left 0.08s, top 0.08s';
      noBtn.style.left = x + 'px';
      noBtn.style.top  = y + 'px';
    }

    noBtn.addEventListener('mousemove',  launchNoBtn);
    noBtn.addEventListener('touchstart', launchNoBtn, { passive: true });
    noBtn.addEventListener('click',      launchNoBtn);

    /* ── Yes Button ── */
    document.getElementById('yes-btn').addEventListener('click', function () {
      eyesActive = false;

      // Happy mouth
      document.getElementById('mouth')
              .setAttribute('d', 'M -18 38 Q 0 58 18 38');

      // Swap to happy squinty eyes
      lPupil.setAttribute('visibility', 'hidden');
      rPupil.setAttribute('visibility', 'hidden');
      lIris.setAttribute('visibility', 'hidden');
      rIris.setAttribute('visibility', 'hidden');
      document.getElementById('l-happy-eye').setAttribute('visibility', 'visible');
      document.getElementById('r-happy-eye').setAttribute('visibility', 'visible');

      // Reset head rotation to neutral
      headGroup.setAttribute('transform', 'translate(145, 140) rotate(0)');
      bodyTiltGroup.style.transform = 'rotate(0deg)';

      // Update sign
      document.getElementById('sign-txt').textContent = 'Thank you! 💖';

      // Happy bounce for otter
      document.getElementById('otter-wrap').classList.add('otter-happy-bounce');

      // Hide buttons
      document.querySelector('.btn-area').style.display = 'none';
      noBtn.style.display = 'none';

      // Show hurray
      document.getElementById('hurray').classList.add('show');

      // Flower shower
      const emojis = ['🌸','🌺','🌼','🌻','💐','🌷','💕','💖','✨','🎉','🎊','💗','🩷','🌈'];
      let count = 0;
      const id = setInterval(function () {
        spawnPetal(emojis);
        count++;
        if (count >= 80) clearInterval(id);
      }, 70);
    });

    function spawnPetal(emojis) {
      const el       = document.createElement('div');
      el.className   = 'petal';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left  = (Math.random() * 100) + 'vw';
      el.style.fontSize        = (Math.random() * 1.4 + 0.7) + 'rem';
      el.style.animationDuration = (Math.random() * 2.5 + 1.8) + 's';
      el.style.animationDelay    = (Math.random() * 0.6) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6000);
    }
  </script>
</body>
</html>

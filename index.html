<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I'm Sorry 🦦💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff0f8 0%, #fde2f0 40%, #ffecd2 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
      user-select: none;
    }

    /* Animated background bubbles */
    .bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.15;
      animation: drift linear infinite;
      pointer-events: none;
    }
    @keyframes drift {
      0%   { transform: translateY(110vh) scale(1); }
      100% { transform: translateY(-20vh) scale(1.1); }
    }

    .title {
      font-size: 2.3rem;
      color: #c0392b;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.12);
      margin-bottom: 8px;
      animation: pulse 2.5s ease-in-out infinite;
      text-align: center;
      z-index: 1;
    }
    .subtitle {
      font-size: 1.15rem;
      color: #7f6250;
      margin-bottom: 18px;
      text-align: center;
      z-index: 1;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    #otter-wrap {
      width: 300px;
      height: 380px;
      animation: float-elite 4s cubic-bezier(0.4, 0.0, 0.6, 1.0) infinite;
      cursor: none;
      z-index: 1;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.12));
    }
    @keyframes float-elite {
      0%, 100% { transform: translateY(0) scale(1); }
      25%      { transform: translateY(-18px) scale(1.02); }
      50%      { transform: translateY(-8px) scale(1); }
      75%      { transform: translateY(-14px) scale(1.01); }
    }
    .otter-happy-bounce {
      animation: happy-dance 0.5s ease-in-out infinite !important;
    }
    @keyframes happy-dance {
      0%, 100% { transform: scale(1) rotate(-3deg); }
      50%       { transform: scale(1.07) rotate(3deg); }
    }

    .btn-area {
      display: flex;
      gap: 22px;
      margin-top: 24px;
      z-index: 1;
    }
    .btn {
      padding: 14px 34px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      font-family: inherit;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }

    #yes-btn {
      background: linear-gradient(135deg, #fd79a8, #e84393);
      color: white;
    }
    #no-btn {
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      color: white;
      position: relative; /* becomes fixed on first hover */
    }

    /* Falling flowers */
    .petal {
      position: fixed;
      pointer-events: none;
      top: -60px;
      z-index: 900;
      animation: petal-fall linear forwards;
    }
    @keyframes petal-fall {
      0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(115vh) rotate(600deg) scale(0.8); opacity: 0; }
    }

    /* Hurray overlay */
    #hurray {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 950;
      pointer-events: none;
    }
    #hurray.show { display: flex; }

    .hurray-text {
      font-size: 4rem;
      font-weight: bold;
      color: #e84393;
      text-shadow: 3px 3px 12px rgba(0,0,0,0.18);
      animation: hurray-bounce 0.55s ease-in-out infinite;
      text-align: center;
    }
    .hurray-sub {
      font-size: 1.4rem;
      color: #6c5ce7;
      margin-top: 12px;
      text-align: center;
      animation: hurray-bounce 0.55s ease-in-out infinite;
      animation-delay: 0.1s;
    }
    @keyframes hurray-bounce {
      0%, 100% { transform: scale(1) rotate(-2deg); }
      50%       { transform: scale(1.1) rotate(2deg); }
    }
  </style>
</head>
<body>

  <!-- Soft floating background bubbles -->
  <div class="bubble" style="width:160px;height:160px;background:#fd79a8;left:5%;animation-duration:14s;animation-delay:0s;"></div>
  <div class="bubble" style="width:90px;height:90px;background:#a29bfe;left:80%;animation-duration:10s;animation-delay:3s;"></div>
  <div class="bubble" style="width:120px;height:120px;background:#fdcb6e;left:55%;animation-duration:17s;animation-delay:1s;"></div>
  <div class="bubble" style="width:70px;height:70px;background:#55efc4;left:30%;animation-duration:12s;animation-delay:5s;"></div>
  <div class="bubble" style="width:100px;height:100px;background:#fd79a8;left:70%;animation-duration:9s;animation-delay:7s;"></div>

  <div class="title">I'm really sorry... 🥺</div>
  <div class="subtitle">Will you forgive me? 💕</div>

  <!-- SVG Elite Otter with Advanced Animations -->
  <div id="otter-wrap">
    <svg id="otter" viewBox="0 0 320 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Fur gradient for depth -->
        <radialGradient id="body-grad" cx="40%" cy="30%">
          <stop offset="0%" style="stop-color:#A67C52;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#6B4423;stop-opacity:1" />
        </radialGradient>
        <radialGradient id="head-grad" cx="35%" cy="25%">
          <stop offset="0%" style="stop-color:#B8905D;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#5D3A1A;stop-opacity:1" />
        </radialGradient>
        <radialGradient id="belly-grad" cx="50%" cy="40%">
          <stop offset="0%" style="stop-color:#E8D4C0;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#D4C4B0;stop-opacity:1" />
        </radialGradient>
        <!-- Eye shine gradient -->
        <radialGradient id="shine" cx="30%" cy="30%">
          <stop offset="0%" style="stop-color:white;stop-opacity:0.95" />
          <stop offset="100%" style="stop-color:white;stop-opacity:0" />
        </radialGradient>
      </defs>

      <!-- Floating water particles background (subtle) -->
      <g id="water-bubbles" opacity="0.3">
        <circle cx="60" cy="80" r="4" fill="none" stroke="#5DADE2" stroke-width="1"/>
        <circle cx="280" cy="120" r="3" fill="none" stroke="#85C1E2" stroke-width="1"/>
        <circle cx="90" cy="320" r="5" fill="none" stroke="#5DADE2" stroke-width="1"/>
        <circle cx="250" cy="280" r="3.5" fill="none" stroke="#85C1E2" stroke-width="1"/>
      </g>

      <!-- Body group (will handle breathing) -->
      <g id="body-group">
        <!-- Tail - elegant curve -->
        <path d="M 240 300 Q 270 280 280 240 Q 285 200 270 170" 
              stroke="url(#body-grad)" stroke-width="32" fill="none" 
              stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
        <ellipse cx="268" cy="165" rx="20" ry="18" fill="url(#body-grad)"/>

        <!-- Back foot -->
        <ellipse cx="280" cy="320" rx="26" ry="32" fill="#6B4423"/>
        <ellipse cx="280" cy="345" rx="24" ry="14" fill="#4A3219"/>

        <!-- Main body (torso) -->
        <ellipse cx="160" cy="280" rx="82" ry="68" fill="url(#body-grad)"/>

        <!-- Front left foot -->
        <ellipse cx="100" cy="320" rx="24" ry="30" fill="#6B4423"/>
        <g id="left-paw">
          <ellipse cx="100" cy="348" rx="22" ry="12" fill="#4A3219"/>
          <!-- Toe beans -->
          <circle cx="88" cy="348" r="5" fill="#8B5A3C"/>
          <circle cx="100" cy="352" r="4.5" fill="#8B5A3C"/>
          <circle cx="112" cy="348" r="5" fill="#8B5A3C"/>
        </g>

        <!-- Front right foot -->
        <ellipse cx="220" cy="320" rx="24" ry="30" fill="#6B4423"/>
        <g id="right-paw">
          <ellipse cx="220" cy="348" rx="22" ry="12" fill="#4A3219"/>
          <circle cx="208" cy="348" r="5" fill="#8B5A3C"/>
          <circle cx="220" cy="352" r="4.5" fill="#8B5A3C"/>
          <circle cx="232" cy="348" r="5" fill="#8B5A3C"/>
        </g>

        <!-- Belly patch -->
        <ellipse cx="160" cy="290" rx="60" ry="50" fill="url(#belly-grad)"/>

        <!-- Chest -->
        <ellipse cx="160" cy="210" rx="70" ry="60" fill="url(#body-grad)"/>
        <ellipse cx="160" cy="220" rx="50" ry="42" fill="url(#belly-grad)"/>
      </g>

      <!-- Arms group (will animate separately) -->
      <g id="arms-group">
        <!-- Left arm -->
        <g id="left-arm">
          <path d="M 100 250 Q 60 270 50 310" 
                stroke="url(#body-grad)" stroke-width="20" fill="none" 
                stroke-linecap="round" stroke-linejoin="round"/>
          <ellipse cx="45" cy="320" rx="18" ry="15" fill="#6B4423"/>
        </g>
        <!-- Right arm -->
        <g id="right-arm">
          <path d="M 220 250 Q 260 270 270 310" 
                stroke="url(#body-grad)" stroke-width="20" fill="none" 
                stroke-linecap="round" stroke-linejoin="round"/>
          <ellipse cx="275" cy="320" rx="18" ry="15" fill="#6B4423"/>
        </g>
      </g>

      <!-- Head group (rotates for tracking) -->
      <g id="head-group" transform="translate(160, 130)">
        <!-- Head base -->
        <circle cx="0" cy="0" r="90" fill="url(#head-grad)"/>

        <!-- Ears -->
        <g id="left-ear" transform="translate(-70, -75)">
          <circle cx="0" cy="0" r="32" fill="url(#head-grad)"/>
          <circle cx="0" cy="0" r="20" fill="#D4C4B0"/>
          <ellipse cx="0" cy="-2" rx="5" ry="8" fill="#6B4423" opacity="0.5"/>
        </g>
        <g id="right-ear" transform="translate(70, -75)">
          <circle cx="0" cy="0" r="32" fill="url(#head-grad)"/>
          <circle cx="0" cy="0" r="20" fill="#D4C4B0"/>
          <ellipse cx="0" cy="-2" rx="5" ry="8" fill="#6B4423" opacity="0.5"/>
        </g>

        <!-- Face -->
        <ellipse cx="0" cy="8" rx="62" ry="68" fill="url(#belly-grad)"/>

        <!-- Muzzle shading (depth) -->
        <ellipse cx="0" cy="15" rx="58" ry="62" fill="#E8D4C0" opacity="0.6"/>

        <!-- Blush - animated -->
        <g id="blush-left">
          <circle cx="-48" cy="0" r="22" fill="#FFB6D9" opacity="0.4"/>
        </g>
        <g id="blush-right">
          <circle cx="48" cy="0" r="22" fill="#FFB6D9" opacity="0.4"/>
        </g>

        <!-- Nose -->
        <ellipse cx="0" cy="20" rx="13" ry="10" fill="#5D3A1A"/>
        <ellipse cx="-4" cy="18" rx="4" ry="3" fill="#2C1810"/>
        <ellipse cx="4" cy="22" rx="4" ry="3" fill="#2C1810"/>

        <!-- Mouth - animated -->
        <g id="mouth-group">
          <path id="mouth-line" d="M -8 28 Q 0 35 8 28" 
                stroke="#5D3A1A" stroke-width="2.5" fill="none" 
                stroke-linecap="round"/>
        </g>

        <!-- Whiskers - dynamic -->
        <g id="whiskers" stroke="#4A3219" stroke-width="1.8" stroke-linecap="round" opacity="0.8">
          <!-- Left whiskers -->
          <line x1="-35" y1="8" x2="-75" y2="0" class="whisker"/>
          <line x1="-38" y1="18" x2="-80" y2="18" class="whisker"/>
          <line x1="-35" y1="28" x2="-75" y2="38" class="whisker"/>
          <!-- Right whiskers -->
          <line x1="35" y1="8" x2="75" y2="0" class="whisker"/>
          <line x1="38" y1="18" x2="80" y2="18" class="whisker"/>
          <line x1="35" y1="28" x2="75" y2="38" class="whisker"/>
        </g>

        <!-- Eyes group -->
        <g id="eyes-group">
          <!-- Left Eye -->
          <g id="l-eye">
            <circle cx="-32" cy="-18" r="32" fill="white" opacity="0.95"/>
            <!-- Eye socket depth -->
            <circle cx="-32" cy="-18" r="32" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="3"/>
            
            <!-- Iris base -->
            <g id="l-iris-group">
              <circle id="l-iris" cx="-32" cy="-18" r="20" fill="#3D4A5C"/>
              <circle id="l-pupil" cx="-32" cy="-18" r="13" fill="#0F1419"/>
              <!-- Multiple shine layers for realism -->
              <circle cx="-24" cy="-26" r="6" fill="url(#shine)" opacity="0.85"/>
              <circle cx="-38" cy="-8" r="3" fill="white" opacity="0.6"/>
            </g>
            
            <!-- Eyelid top (hidden, shows on blink) -->
            <ellipse id="l-eyelid-top" cx="-32" cy="-50" rx="32" ry="20" fill="url(#head-grad)" opacity="0"/>
            <!-- Eyelid bottom (hidden, shows on blink) -->
            <ellipse id="l-eyelid-bottom" cx="-32" cy="14" rx="32" ry="16" fill="url(#head-grad)" opacity="0"/>
          </g>

          <!-- Right Eye -->
          <g id="r-eye">
            <circle cx="32" cy="-18" r="32" fill="white" opacity="0.95"/>
            <circle cx="32" cy="-18" r="32" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="3"/>
            
            <g id="r-iris-group">
              <circle id="r-iris" cx="32" cy="-18" r="20" fill="#3D4A5C"/>
              <circle id="r-pupil" cx="32" cy="-18" r="13" fill="#0F1419"/>
              <circle cx="40" cy="-26" r="6" fill="url(#shine)" opacity="0.85"/>
              <circle cx="26" cy="-8" r="3" fill="white" opacity="0.6"/>
            </g>
            
            <ellipse id="r-eyelid-top" cx="32" cy="-50" rx="32" ry="20" fill="url(#head-grad)" opacity="0"/>
            <ellipse id="r-eyelid-bottom" cx="32" cy="14" rx="32" ry="16" fill="url(#head-grad)" opacity="0"/>
          </g>
        </g>

        <!-- Happy eyes overlay (hidden) -->
        <g id="happy-eyes" visibility="hidden">
          <ellipse cx="-32" cy="-18" rx="32" ry="28" fill="#D4C4B0"/>
          <path d="M -62 -18 Q -32 -45 -2 -18" fill="white" stroke="#4A3219" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="-32" cy="-12" r="10" fill="#3D4A5C"/>
          <circle cx="-32" cy="-12" r="6" fill="#0F1419"/>
          <circle cx="-26" cy="-16" r="3" fill="white" opacity="0.8"/>

          <ellipse cx="32" cy="-18" rx="32" ry="28" fill="#D4C4B0"/>
          <path d="M 2 -18 Q 32 -45 62 -18" fill="white" stroke="#4A3219" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="32" cy="-12" r="10" fill="#3D4A5C"/>
          <circle cx="32" cy="-12" r="6" fill="#0F1419"/>
          <circle cx="38" cy="-16" r="3" fill="white" opacity="0.8"/>
        </g>
      </g>

      <!-- Sign -->
      <rect x="90" y="340" width="140" height="55" rx="12" fill="#FFFACD" stroke="#FFD700" stroke-width="3.5"/>
      <text id="sign-txt" x="160" y="375" text-anchor="middle" font-size="17" font-weight="bold" 
            fill="#e84393" font-family="Georgia,serif">I'm Sorry! 💕</text>
    </svg>
  </div>

  <div class="btn-area">
    <button class="btn" id="yes-btn">Yes, I forgive you! 💕</button>
    <button class="btn" id="no-btn">No 😤</button>
  </div>

  <div id="hurray">
    <div class="hurray-text">🎉 Hurray! 🎉</div>
    <div class="hurray-sub">Yay, she forgave me! 💖✨</div>
  </div>

  <script>
    /* ══════════════════════════════════════════════════════════════
       ELITE OTTER ANIMATION SYSTEM
       ══════════════════════════════════════════════════════════════ */

    const svg = document.getElementById('otter');
    const headGroup = document.getElementById('head-group');
    const bodyGroup = document.getElementById('body-group');
    const armsGroup = document.getElementById('arms-group');
    const whiskers = document.querySelectorAll('.whisker');
    
    // Eye elements
    const lPupil = document.getElementById('l-pupil');
    const rPupil = document.getElementById('r-pupil');
    const lIris = document.getElementById('l-iris');
    const rIris = document.getElementById('r-iris');
    const lEyelidTop = document.getElementById('l-eyelid-top');
    const rEyelidTop = document.getElementById('r-eyelid-top');
    const lEyelidBottom = document.getElementById('l-eyelid-bottom');
    const rEyelidBottom = document.getElementById('r-eyelid-bottom');

    // Eye centres (in head-group coordinates)
    const eyeL = { x: -32, y: -18 };
    const eyeR = { x: 32, y: -18 };

    const MAX_IRIS = 8;
    const MAX_PUPIL = 11;

    // ── SMOOTH EYE TRACKING ──
    let currentMouseX = window.innerWidth / 2;
    let currentMouseY = window.innerHeight / 2;
    let trackingActive = true;

    function calcEyeOffset(eyeX, eyeY, mx, my, max) {
      const dx = mx - eyeX;
      const dy = my - eyeY;
      const dist = Math.hypot(dx, dy);
      const capped = Math.min(max, dist * max / 65);
      const angle = Math.atan2(dy, dx);
      return {
        x: eyeX + Math.cos(angle) * capped,
        y: eyeY + Math.sin(angle) * capped
      };
    }

    document.addEventListener('mousemove', (e) => {
      currentMouseX = e.clientX;
      currentMouseY = e.clientY;
    });

    // Animation loop for smooth eye tracking
    let animationFrameId = null;
    function updateEyes() {
      if (!trackingActive) return;

      const rect = svg.getBoundingClientRect();
      const scaleX = 320 / rect.width;
      const scaleY = 400 / rect.height;
      const mx = (currentMouseX - rect.left) * scaleX - 160; // relative to head center
      const my = (currentMouseY - rect.top) * scaleY - 130;

      // Smooth eye travel
      const lP = calcEyeOffset(eyeL.x, eyeL.y, mx, my, MAX_PUPIL);
      const rP = calcEyeOffset(eyeR.x, eyeR.y, mx, my, MAX_PUPIL);
      const lI = calcEyeOffset(eyeL.x, eyeL.y, mx, my, MAX_IRIS);
      const rI = calcEyeOffset(eyeR.x, eyeR.y, mx, my, MAX_IRIS);

      lPupil.setAttribute('cx', lP.x);
      lPupil.setAttribute('cy', lP.y);
      rPupil.setAttribute('cx', rP.x);
      rPupil.setAttribute('cy', rP.y);
      lIris.setAttribute('cx', lI.x);
      lIris.setAttribute('cy', lI.y);
      rIris.setAttribute('cx', rI.x);
      rIris.setAttribute('cy', rI.y);

      // HEAD ROTATION (smooth, natural)
      const dx = mx;
      const dy = my;
      const angle = Math.atan2(dy, dx);
      let headRot = angle * 180 / Math.PI;
      headRot = Math.max(-28, Math.min(28, headRot));
      headGroup.setAttribute('transform', `translate(160, 130) rotate(${headRot})`);

      animationFrameId = requestAnimationFrame(updateEyes);
    }
    updateEyes();

    // ── BLINKING ──
    let blinkTimer = 0;
    const BLINK_INTERVAL = 3000 + Math.random() * 2000; // 3-5 seconds
    const BLINK_DURATION = 150;

    function blink() {
      const startTime = Date.now();
      
      const blinkInterval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(1, elapsed / BLINK_DURATION);
        const easeProgress = Math.sin(progress * Math.PI); // smooth easing

        lEyelidTop.setAttribute('opacity', easeProgress * 0.95);
        rEyelidTop.setAttribute('opacity', easeProgress * 0.95);
        lEyelidBottom.setAttribute('opacity', easeProgress * 0.85);
        rEyelidBottom.setAttribute('opacity', easeProgress * 0.85);

        if (elapsed > BLINK_DURATION) {
          clearInterval(blinkInterval);
          lEyelidTop.setAttribute('opacity', '0');
          rEyelidTop.setAttribute('opacity', '0');
          lEyelidBottom.setAttribute('opacity', '0');
          rEyelidBottom.setAttribute('opacity', '0');
        }
      }, 16);
    }

    // Start blinking cycle
    setInterval(() => {
      if (trackingActive && Math.random() > 0.3) {
        blink();
      }
    }, BLINK_INTERVAL);

    // ── BODY BREATHING ──
    const breatheStartTime = Date.now();
    setInterval(() => {
      const elapsed = Date.now() - breatheStartTime;
      const breathe = Math.sin((elapsed / 3000) * Math.PI * 2) * 0.12;
      const breatheScale = 1 + breathe;
      bodyGroup.style.transform = `scaleY(${breatheScale})`;
    }, 16);

    // ── ARM WAVE ──
    const waveStart = Date.now();
    const leftArm = document.getElementById('left-arm');
    const rightArm = document.getElementById('right-arm');
    
    setInterval(() => {
      const elapsed = Date.now() - waveStart;
      const waveAngle = (elapsed / 4000) * Math.PI * 2;
      const waveAmount = Math.sin(waveAngle) * 3;
      leftArm.style.transform = `rotate(${waveAmount}deg)`;
      rightArm.style.transform = `rotate(${-waveAmount}deg)`;
    }, 16);

    // ── WHISKER FLUTTER ──
    const flutterStart = Date.now();
    setInterval(() => {
      const elapsed = Date.now() - flutterStart;
      const flutter = Math.sin((elapsed / 2500) * Math.PI * 2) * 1.2;
      whiskers.forEach(w => {
        w.style.transform = `rotate(${flutter}deg)`;
        w.style.transformOrigin = w.getAttribute('x1') + ' ' + w.getAttribute('y1');
      });
    }, 16);

    // ── BLUSH PULSE ──
    const blushLeft = document.getElementById('blush-left').querySelector('circle');
    const blushRight = document.getElementById('blush-right').querySelector('circle');
    const blushStart = Date.now();
    
    setInterval(() => {
      const elapsed = Date.now() - blushStart;
      const pulse = Math.sin((elapsed / 2800) * Math.PI * 2);
      const blushOpacity = 0.35 + pulse * 0.15;
      if (blushLeft) blushLeft.setAttribute('opacity', blushOpacity);
      if (blushRight) blushRight.setAttribute('opacity', blushOpacity);
    }, 16);

    /* ── NO BUTTON ESCAPE ── */
    const noBtn = document.getElementById('no-btn');
    let noBtnReady = false;

    function launchNoBtn() {
      if (!noBtnReady) {
        const r = noBtn.getBoundingClientRect();
        noBtn.style.position = 'fixed';
        noBtn.style.margin = '0';
        noBtn.style.left = r.left + 'px';
        noBtn.style.top = r.top + 'px';
        noBtnReady = true;
      }
      const pad = 30;
      const w = noBtn.offsetWidth;
      const h = noBtn.offsetHeight;
      const x = Math.random() * (window.innerWidth - w - pad * 2) + pad;
      const y = Math.random() * (window.innerHeight - h - pad * 2) + pad;
      noBtn.style.transition = 'left 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94), top 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    }

    noBtn.addEventListener('mousemove', launchNoBtn);
    noBtn.addEventListener('touchstart', launchNoBtn, { passive: true });
    noBtn.addEventListener('click', launchNoBtn);

    /* ── YES BUTTON - CELEBRATION ── */
    document.getElementById('yes-btn').addEventListener('click', function () {
      trackingActive = false;

      // Happy mouth animation
      const mouth = document.getElementById('mouth-line');
      mouth.setAttribute('d', 'M -12 28 Q 0 45 12 28');
      mouth.style.stroke = '#e84393';
      mouth.style.strokeWidth = '3';

      // Swap to happy eyes
      const happyEyes = document.getElementById('happy-eyes');
      document.getElementById('l-eye').style.display = 'none';
      document.getElementById('r-eye').style.display = 'none';
      happyEyes.setAttribute('visibility', 'visible');

      // Head bounce to center
      let bounceCount = 0;
      const bounceInterval = setInterval(() => {
        const bounce = Math.sin(bounceCount / 10 * Math.PI) * 8;
        headGroup.setAttribute('transform', `translate(160, 130) rotate(0) translateY(${-bounce})`);
        bounceCount++;
        if (bounceCount > 10) {
          clearInterval(bounceInterval);
          headGroup.setAttribute('transform', `translate(160, 130) rotate(0)`);
        }
      }, 30);

      // Reset body movements
      bodyGroup.style.transform = 'scaleY(1.05)';
      
      // Update sign
      document.getElementById('sign-txt').textContent = 'Thank you! 💖';

      // Happy bounce animation
      document.getElementById('otter-wrap').style.animation = 'happy-bounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite';

      // Hide buttons
      document.querySelector('.btn-area').style.display = 'none';

      // Show celebration
      document.getElementById('hurray').classList.add('show');

      // Petal shower
      const emojis = ['🌸','🌺','🌼','🌻','💐','🌷','💕','💖','✨','🎉','🎊','💗','🩷','🌈'];
      let count = 0;
      const id = setInterval(() => {
        spawnPetal(emojis);
        count++;
        if (count >= 100) clearInterval(id);
      }, 60);

      // Cancel frame animation to prevent conflicts
      cancelAnimationFrame(animationFrameId);
    });

    // Add happy bounce keyframe
    const style = document.createElement('style');
    style.textContent = `
      @keyframes happy-bounce {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-22px) scale(1.08); }
      }
    `;
    document.head.appendChild(style);

    function spawnPetal(emojis) {
      const el = document.createElement('div');
      el.className = 'petal';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (Math.random() * 1.6 + 0.8) + 'rem';
      el.style.animationDuration = (Math.random() * 2.8 + 2.0) + 's';
      el.style.animationDelay = Math.random() * 0.8 + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6500);
    }
  </script>
</body>
</html>

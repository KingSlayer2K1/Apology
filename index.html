<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I'm Sorry 🦦💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff0f8 0%, #fde2f0 40%, #ffecd2 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
      user-select: none;
    }

    /* Animated background bubbles */
    .bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.15;
      animation: drift linear infinite;
      pointer-events: none;
    }
    @keyframes drift {
      0%   { transform: translateY(110vh) scale(1); }
      100% { transform: translateY(-20vh) scale(1.1); }
    }

    .title {
      font-size: 2.3rem;
      color: #c0392b;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.12);
      margin-bottom: 8px;
      animation: pulse 2.5s ease-in-out infinite;
      text-align: center;
      z-index: 1;
    }
    .subtitle {
      font-size: 1.15rem;
      color: #7f6250;
      margin-bottom: 18px;
      text-align: center;
      z-index: 1;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    #otter-wrap {
      width: 270px;
      height: 310px;
      animation: float 3.2s ease-in-out infinite;
      cursor: none;
      z-index: 1;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-13px); }
    }
    .otter-happy-bounce {
      animation: happy-dance 0.5s ease-in-out infinite !important;
    }
    @keyframes happy-dance {
      0%, 100% { transform: scale(1) rotate(-3deg); }
      50%       { transform: scale(1.07) rotate(3deg); }
    }

    .btn-area {
      display: flex;
      gap: 22px;
      margin-top: 24px;
      z-index: 1;
    }
    .btn {
      padding: 14px 34px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      font-family: inherit;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }

    #yes-btn {
      background: linear-gradient(135deg, #fd79a8, #e84393);
      color: white;
    }
    #no-btn {
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      color: white;
      position: relative; /* becomes fixed on first hover */
    }

    /* Falling flowers */
    .petal {
      position: fixed;
      pointer-events: none;
      top: -60px;
      z-index: 900;
      animation: petal-fall linear forwards;
    }
    @keyframes petal-fall {
      0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(115vh) rotate(600deg) scale(0.8); opacity: 0; }
    }

    /* Hurray overlay */
    #hurray {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 950;
      pointer-events: none;
    }
    #hurray.show { display: flex; }

    .hurray-text {
      font-size: 4rem;
      font-weight: bold;
      color: #e84393;
      text-shadow: 3px 3px 12px rgba(0,0,0,0.18);
      animation: hurray-bounce 0.55s ease-in-out infinite;
      text-align: center;
    }
    .hurray-sub {
      font-size: 1.4rem;
      color: #6c5ce7;
      margin-top: 12px;
      text-align: center;
      animation: hurray-bounce 0.55s ease-in-out infinite;
      animation-delay: 0.1s;
    }
    @keyframes hurray-bounce {
      0%, 100% { transform: scale(1) rotate(-2deg); }
      50%       { transform: scale(1.1) rotate(2deg); }
    }
  </style>
</head>
<body>

  <!-- Soft floating background bubbles -->
  <div class="bubble" style="width:160px;height:160px;background:#fd79a8;left:5%;animation-duration:14s;animation-delay:0s;"></div>
  <div class="bubble" style="width:90px;height:90px;background:#a29bfe;left:80%;animation-duration:10s;animation-delay:3s;"></div>
  <div class="bubble" style="width:120px;height:120px;background:#fdcb6e;left:55%;animation-duration:17s;animation-delay:1s;"></div>
  <div class="bubble" style="width:70px;height:70px;background:#55efc4;left:30%;animation-duration:12s;animation-delay:5s;"></div>
  <div class="bubble" style="width:100px;height:100px;background:#fd79a8;left:70%;animation-duration:9s;animation-delay:7s;"></div>

  <div class="title">I'm really sorry... 🥺</div>
  <div class="subtitle">Will you forgive me? 💕</div>

  <!-- SVG Otter -->
  <div id="otter-wrap">
    <svg id="otter" viewBox="0 0 280 310" xmlns="http://www.w3.org/2000/svg">

      <!-- Tail -->
      <ellipse cx="218" cy="272" rx="44" ry="19" fill="#7B4F2E" transform="rotate(-18,218,272)"/>

      <!-- Body -->
      <ellipse cx="140" cy="260" rx="73" ry="58" fill="#9B6B3A"/>
      <!-- Belly -->
      <ellipse cx="140" cy="268" rx="49" ry="40" fill="#C4936A"/>

      <!-- Head -->
      <circle cx="140" cy="148" r="87" fill="#9B6B3A"/>

      <!-- Left ear -->
      <circle cx="67" cy="78" r="25" fill="#9B6B3A"/>
      <circle cx="67" cy="78" r="15" fill="#C4826A"/>
      <!-- Right ear -->
      <circle cx="213" cy="78" r="25" fill="#9B6B3A"/>
      <circle cx="213" cy="78" r="15" fill="#C4826A"/>

      <!-- Face lighter patch -->
      <ellipse cx="140" cy="162" rx="64" ry="60" fill="#C4936A"/>

      <!-- ── LEFT EYE ── -->
      <circle cx="107" cy="140" r="26" fill="white"/>
      <circle id="l-iris"  cx="107" cy="140" r="17" fill="#2980b9"/>
      <circle id="l-pupil" cx="107" cy="140" r="10" fill="#1a1a2e"/>
      <!-- shines (static) -->
      <circle cx="115" cy="133" r="4"   fill="white" opacity="0.92"/>
      <circle cx="101" cy="147" r="2.5" fill="white" opacity="0.72"/>
      <!-- outline -->
      <circle cx="107" cy="140" r="26" fill="none" stroke="#5D3A1A" stroke-width="2.2"/>
      <!-- Happy eye overlay (hidden) — covers top half with face colour, shows squint smile -->
      <g id="l-happy-eye" visibility="hidden">
        <circle cx="107" cy="140" r="26" fill="#C4936A"/>
        <path d="M 82 140 Q 107 122 132 140 Q 107 158 82 140"
              fill="white" stroke="#5D3A1A" stroke-width="2.2"/>
        <circle cx="107" cy="148" r="8"  fill="#2980b9"/>
        <circle cx="107" cy="148" r="5"  fill="#1a1a2e"/>
        <circle cx="112" cy="145" r="2.5" fill="white" opacity="0.9"/>
      </g>

      <!-- ── RIGHT EYE ── -->
      <circle cx="173" cy="140" r="26" fill="white"/>
      <circle id="r-iris"  cx="173" cy="140" r="17" fill="#2980b9"/>
      <circle id="r-pupil" cx="173" cy="140" r="10" fill="#1a1a2e"/>
      <!-- shines (static) -->
      <circle cx="181" cy="133" r="4"   fill="white" opacity="0.92"/>
      <circle cx="167" cy="147" r="2.5" fill="white" opacity="0.72"/>
      <!-- outline -->
      <circle cx="173" cy="140" r="26" fill="none" stroke="#5D3A1A" stroke-width="2.2"/>
      <!-- Happy eye overlay (hidden) -->
      <g id="r-happy-eye" visibility="hidden">
        <circle cx="173" cy="140" r="26" fill="#C4936A"/>
        <path d="M 148 140 Q 173 122 198 140 Q 173 158 148 140"
              fill="white" stroke="#5D3A1A" stroke-width="2.2"/>
        <circle cx="173" cy="148" r="8"  fill="#2980b9"/>
        <circle cx="173" cy="148" r="5"  fill="#1a1a2e"/>
        <circle cx="178" cy="145" r="2.5" fill="white" opacity="0.9"/>
      </g>

      <!-- Blush cheeks -->
      <circle cx="80"  cy="170" r="18" fill="#FF8FAB" opacity="0.42"/>
      <circle cx="200" cy="170" r="18" fill="#FF8FAB" opacity="0.42"/>

      <!-- Nose -->
      <ellipse cx="140" cy="182" rx="9" ry="6.5" fill="#5D3A1A"/>

      <!-- Mouth — sorry / slightly sad -->
      <path id="mouth"
            d="M 124 200 Q 140 191 156 200"
            stroke="#5D3A1A" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- Left arm -->
      <path d="M 82 236 Q 62 260 74 280" stroke="#9B6B3A" stroke-width="16" fill="none" stroke-linecap="round"/>
      <ellipse cx="72" cy="284" rx="15" ry="12" fill="#9B6B3A"/>
      <!-- Right arm -->
      <path d="M 198 236 Q 218 260 206 280" stroke="#9B6B3A" stroke-width="16" fill="none" stroke-linecap="round"/>
      <ellipse cx="208" cy="284" rx="15" ry="12" fill="#9B6B3A"/>

      <!-- Sign -->
      <rect x="93" y="292" width="94" height="34" rx="7" fill="#fffde7" stroke="#f9ca24" stroke-width="2.2"/>
      <text id="sign-txt" x="140" y="314"
            text-anchor="middle" font-size="11.5" fill="#e17055"
            font-weight="bold" font-family="Georgia,serif">I'm Sorry! 💕</text>

    </svg>
  </div>

  <div class="btn-area">
    <button class="btn" id="yes-btn">Yes, I forgive you! 💕</button>
    <button class="btn" id="no-btn">No 😤</button>
  </div>

  <div id="hurray">
    <div class="hurray-text">🎉 Hurray! 🎉</div>
    <div class="hurray-sub">Yay, she forgave me! 💖✨</div>
  </div>

  <script>
    /* ── Eye Tracking ── */
    const svg     = document.getElementById('otter');
    const lIris   = document.getElementById('l-iris');
    const rIris   = document.getElementById('r-iris');
    const lPupil  = document.getElementById('l-pupil');
    const rPupil  = document.getElementById('r-pupil');

    // Eye centres in SVG viewBox coordinates
    const L = { x: 107, y: 140 };
    const R = { x: 173, y: 140 };

    const MAX_IRIS  = 6;   // max iris travel (px in SVG units)
    const MAX_PUPIL = 8;   // max pupil travel

    function calcOffset(eyeX, eyeY, mxSVG, mySVG, max) {
      const dx    = mxSVG - eyeX;
      const dy    = mySVG - eyeY;
      const hyp   = Math.hypot(dx, dy);
      const dist  = Math.min(max, hyp * max / 55);   // ramps to max over 55 SVG-units
      const angle = Math.atan2(dy, dx);
      return { x: eyeX + Math.cos(angle) * dist,
               y: eyeY + Math.sin(angle) * dist };
    }

    let eyesActive = true;

    document.addEventListener('mousemove', function (e) {
      if (!eyesActive) return;
      const rect   = svg.getBoundingClientRect();
      const scaleX = 280 / rect.width;
      const scaleY = 310 / rect.height;
      const mx     = (e.clientX - rect.left) * scaleX;
      const my     = (e.clientY - rect.top)  * scaleY;

      const lP = calcOffset(L.x, L.y, mx, my, MAX_PUPIL);
      const rP = calcOffset(R.x, R.y, mx, my, MAX_PUPIL);
      const lI = calcOffset(L.x, L.y, mx, my, MAX_IRIS);
      const rI = calcOffset(R.x, R.y, mx, my, MAX_IRIS);

      lPupil.setAttribute('cx', lP.x); lPupil.setAttribute('cy', lP.y);
      rPupil.setAttribute('cx', rP.x); rPupil.setAttribute('cy', rP.y);
      lIris.setAttribute('cx', lI.x);  lIris.setAttribute('cy', lI.y);
      rIris.setAttribute('cx', rI.x);  rIris.setAttribute('cy', rI.y);
    });

    /* ── No Button Escape ── */
    const noBtn = document.getElementById('no-btn');
    let noBtnReady = false;

    function launchNoBtn() {
      if (!noBtnReady) {
        // Teleport to fixed coords matching current layout position first
        const r = noBtn.getBoundingClientRect();
        noBtn.style.position = 'fixed';
        noBtn.style.margin   = '0';
        noBtn.style.left     = r.left + 'px';
        noBtn.style.top      = r.top  + 'px';
        noBtnReady = true;
      }
      const pad = 30;
      const w   = noBtn.offsetWidth;
      const h   = noBtn.offsetHeight;
      const x   = Math.random() * (window.innerWidth  - w - pad * 2) + pad;
      const y   = Math.random() * (window.innerHeight - h - pad * 2) + pad;
      noBtn.style.transition = 'left 0.08s, top 0.08s';
      noBtn.style.left = x + 'px';
      noBtn.style.top  = y + 'px';
    }

    noBtn.addEventListener('mousemove',  launchNoBtn);
    noBtn.addEventListener('touchstart', launchNoBtn, { passive: true });
    noBtn.addEventListener('click',      launchNoBtn); // just in case

    /* ── Yes Button ── */
    document.getElementById('yes-btn').addEventListener('click', function () {
      // Stop eye tracking
      eyesActive = false;

      // Happy mouth (big smile)
      document.getElementById('mouth')
              .setAttribute('d', 'M 118 198 Q 140 220 162 198');

      // Swap to happy squinty eyes
      lPupil.setAttribute('visibility', 'hidden');
      rPupil.setAttribute('visibility', 'hidden');
      lIris.setAttribute('visibility', 'hidden');
      rIris.setAttribute('visibility', 'hidden');
      document.getElementById('l-happy-eye').setAttribute('visibility', 'visible');
      document.getElementById('r-happy-eye').setAttribute('visibility', 'visible');

      // Update sign
      document.getElementById('sign-txt').textContent = 'Thank you! 💖';

      // Happy bounce for otter
      document.getElementById('otter-wrap').classList.add('otter-happy-bounce');

      // Hide buttons
      document.querySelector('.btn-area').style.display = 'none';
      noBtn.style.display = 'none';

      // Show hurray
      document.getElementById('hurray').classList.add('show');

      // Flower shower
      const emojis = ['🌸','🌺','🌼','🌻','💐','🌷','💕','💖','✨','🎉','🎊','💗','🩷','🌈'];
      let count = 0;
      const id = setInterval(function () {
        spawnPetal(emojis);
        count++;
        if (count >= 80) clearInterval(id);
      }, 70);
    });

    function spawnPetal(emojis) {
      const el       = document.createElement('div');
      el.className   = 'petal';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left  = (Math.random() * 100) + 'vw';
      el.style.fontSize        = (Math.random() * 1.4 + 0.7) + 'rem';
      el.style.animationDuration = (Math.random() * 2.5 + 1.8) + 's';
      el.style.animationDelay    = (Math.random() * 0.6) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6000);
    }
  </script>
</body>
</html>
